name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Security: Restrict default permissions
permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'
  POETRY_VERSION: '2.1.0'

jobs:
  # Stage 1: Basic validation
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      # Security: Pin actions to full commit SHAs
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: |
          # Security: Install specific version via pip instead of piping to shell
          pip install poetry==${{ env.POETRY_VERSION }}

      - name: Cache Poetry dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-root

      - name: Lint with Ruff
        run: poetry run ruff check scripts/ tests/ --ignore E501,I001,F401 || echo "Lint warnings (non-blocking)"
        continue-on-error: true

      - name: Check Python formatting with Black
        run: poetry run black --check scripts/ tests/ || echo "Format warnings (non-blocking)"
        continue-on-error: true

      - name: Validate shell scripts
        run: |
          bash -n lakehouse
          bash -n scripts/download-jars.sh
          echo "Shell syntax OK"

      - name: Validate docker-compose files
        run: |
          # Create minimal .env for validation
          touch .env
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose-spark41.yml config --quiet
          docker compose -f docker-compose-kafka.yml config --quiet
          echo "Docker Compose configs valid"

  # Stage 2: Unit tests (no external services required)
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: |
          # Security: Install specific version via pip instead of piping to shell
          pip install poetry==${{ env.POETRY_VERSION }}

      - name: Cache Poetry dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --with dev,test

      - name: Run unit tests
        run: |
          poetry run pytest tests/ \
            -v \
            --ignore=tests/integration/ \
            --tb=short \
            -x
        continue-on-error: true

  # Stage 3: Container startup (validates images pull and basic startup)
  containers:
    name: Container Startup
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create required directories
        run: |
          mkdir -p config/spark jars ivy-cache notebooks
          sudo mkdir -p /data/spark
          sudo chmod 777 /data/spark

      - name: Create minimal spark-defaults.conf
        run: |
          cat > config/spark/spark-defaults.conf << 'EOF'
          spark.master                     spark://localhost:7077
          spark.executor.memory            1g
          spark.driver.memory              1g
          EOF

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          POSTGRES_USER=test
          POSTGRES_PASSWORD=test
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432
          EOF

      - name: Pull and verify Spark 4.0 image
        run: |
          docker pull apache/spark:4.0.1-scala2.13-java17-python3-r-ubuntu
          docker run --rm apache/spark:4.0.1-scala2.13-java17-python3-r-ubuntu \
            /opt/spark/bin/spark-submit --version 2>&1 | grep -E "version [0-9]"
          echo "Spark 4.0 image: OK"

      - name: Pull and verify Spark 4.1 image
        run: |
          docker pull apache/spark:4.1.0-scala2.13-java21-python3-r-ubuntu
          docker run --rm apache/spark:4.1.0-scala2.13-java21-python3-r-ubuntu \
            /opt/spark/bin/spark-submit --version 2>&1 | grep -E "version [0-9]"
          echo "Spark 4.1 image: OK"

      - name: Start and verify Kafka containers
        run: |
          docker compose -f docker-compose-kafka.yml up -d
          sleep 15
          docker ps
          # Confluent Kafka uses /usr/bin/
          docker exec kafka kafka-topics --list --bootstrap-server localhost:9092 || true
          echo "Kafka containers: OK"

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose-kafka.yml down || true

  # Stage 4: Integration tests with services
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, containers]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: iceberg
          POSTGRES_PASSWORD: iceberg
          POSTGRES_DB: iceberg_catalog
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: |
          # Security: Install specific version via pip instead of piping to shell
          pip install poetry==${{ env.POETRY_VERSION }}

      - name: Cache Poetry dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies (including test extras)
        run: |
          poetry install --with dev,test
          poetry run pip install testcontainers kafka-python psycopg2-binary

      - name: Cache JAR downloads
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: jars/
          key: jars-${{ hashFiles('scripts/download-jars.sh') }}
          restore-keys: |
            jars-

      - name: Download JARs (if not cached)
        run: |
          if [ ! -f "jars/iceberg-spark-runtime-4.0_2.13-1.10.0.jar" ]; then
            bash scripts/download-jars.sh
          else
            echo "JARs already cached"
            bash scripts/download-jars.sh --verify-only || true
          fi

      - name: Test PostgreSQL connectivity
        run: |
          PGPASSWORD=iceberg psql -h localhost -U iceberg -d iceberg_catalog -c "SELECT 1;"
          echo "PostgreSQL: OK"

      - name: Run integration tests (fresh install validation)
        run: |
          poetry run pytest tests/integration/test_fresh_install.py \
            -v \
            --tb=short \
            -x
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: iceberg
          POSTGRES_PASSWORD: iceberg

      - name: Run Spark Pi example (local mode)
        run: |
          docker run --rm \
            apache/spark:4.1.0-scala2.13-java21-python3-r-ubuntu \
            /opt/spark/bin/spark-submit \
            --master "local[2]" \
            --class org.apache.spark.examples.SparkPi \
            /opt/spark/examples/jars/spark-examples_2.13-4.1.0.jar 10
          echo "Spark job submission: OK"
        timeout-minutes: 5

      - name: Start Kafka and create test topic
        run: |
          docker compose -f docker-compose-kafka.yml up -d
          sleep 15
          # Confluent Kafka uses kafka-topics (no .sh)
          docker exec kafka kafka-topics \
            --create --topic test-events \
            --bootstrap-server localhost:9092 \
            --partitions 1 --replication-factor 1 || true
          docker exec kafka kafka-topics --list --bootstrap-server localhost:9092
          echo "Kafka topic creation: OK"

      - name: Run Kafka integration tests
        run: |
          poetry run pytest tests/integration/test_kafka_streaming.py \
            -v \
            --tb=short \
            -k "TestKafkaConnectivity" \
            || echo "Kafka tests completed (some may have skipped)"
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose-kafka.yml down || true

  # Stage 5: Multi-version Spark matrix
  spark-matrix:
    name: Spark ${{ matrix.spark-version }} Tests
    runs-on: ubuntu-latest
    needs: integration
    strategy:
      fail-fast: false
      matrix:
        spark-version: ['4.0', '4.1']
        include:
          - spark-version: '4.0'
            image: apache/spark:4.0.1-scala2.13-java17-python3-r-ubuntu
            compose-file: docker-compose.yml
            port: 7077
          - spark-version: '4.1'
            image: apache/spark:4.1.0-scala2.13-java21-python3-r-ubuntu
            compose-file: docker-compose-spark41.yml
            port: 7078

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Create required directories
        run: |
          mkdir -p config/spark jars ivy-cache notebooks
          sudo mkdir -p /data/spark
          sudo chmod 777 /data/spark

      - name: Create minimal config
        run: |
          cat > config/spark/spark-defaults.conf << EOF
          spark.master                     spark://localhost:${{ matrix.port }}
          spark.executor.memory            1g
          spark.driver.memory              1g
          EOF
          touch .env

      - name: Cache JAR downloads
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: jars/
          key: jars-${{ hashFiles('scripts/download-jars.sh') }}
          restore-keys: |
            jars-

      - name: Download JARs (if not cached)
        run: |
          if [ ! -f "jars/iceberg-spark-runtime-4.0_2.13-1.10.0.jar" ]; then
            bash scripts/download-jars.sh
          fi

      - name: Test Spark ${{ matrix.spark-version }} container startup
        run: |
          docker compose -f ${{ matrix.compose-file }} up -d
          sleep 20
          docker ps
          # Verify Spark master is running
          curl -s http://localhost:${{ matrix.spark-version == '4.0' && '8080' || '8082' }} | grep -q "Spark Master" || true
          echo "Spark ${{ matrix.spark-version }} startup: OK"

      - name: Run basic Spark job
        run: |
          docker run --rm \
            --network host \
            ${{ matrix.image }} \
            /opt/spark/bin/spark-submit \
            --master "local[2]" \
            --class org.apache.spark.examples.SparkPi \
            /opt/spark/examples/jars/spark-examples_2.13-${{ matrix.spark-version == '4.0' && '4.0.1' || '4.1.0' }}.jar 5
        timeout-minutes: 5

      - name: Cleanup
        if: always()
        run: |
          docker compose -f ${{ matrix.compose-file }} down || true

  # Stage 6: End-to-end pipeline test
  # Runs on: pushes to master/develop AND PRs targeting master/develop
  e2e-pipeline:
    name: E2E Pipeline Test
    runs-on: ubuntu-latest
    needs: spark-matrix
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')) ||
      (github.event_name == 'pull_request' && (github.base_ref == 'master' || github.base_ref == 'develop'))
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: iceberg
          POSTGRES_PASSWORD: iceberg
          POSTGRES_DB: iceberg_catalog
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: |
          # Security: Install specific version via pip instead of piping to shell
          pip install poetry==${{ env.POETRY_VERSION }}

      - name: Cache Poetry dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry install --with dev,test
          poetry run pip install testcontainers kafka-python psycopg2-binary

      - name: Cache JAR downloads
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: jars/
          key: jars-${{ hashFiles('scripts/download-jars.sh') }}

      - name: Setup environment
        run: |
          mkdir -p config/spark jars ivy-cache notebooks
          sudo mkdir -p /data/spark
          sudo chmod 777 /data/spark

          cat > config/spark/spark-defaults.conf << 'EOF'
          spark.master                     spark://localhost:7078
          spark.executor.memory            1g
          spark.driver.memory              1g
          spark.sql.extensions             org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
          spark.sql.catalog.iceberg        org.apache.iceberg.spark.SparkCatalog
          spark.sql.catalog.iceberg.type   jdbc
          spark.sql.catalog.iceberg.uri    jdbc:postgresql://localhost:5432/iceberg_catalog
          spark.sql.catalog.iceberg.jdbc.user iceberg
          spark.sql.catalog.iceberg.jdbc.password iceberg
          spark.sql.catalog.iceberg.warehouse /tmp/warehouse
          EOF

          cat > .env << 'EOF'
          POSTGRES_USER=iceberg
          POSTGRES_PASSWORD=iceberg
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432
          S3_ACCESS_KEY=test
          S3_SECRET_KEY=test
          EOF

          if [ ! -f "jars/iceberg-spark-runtime-4.0_2.13-1.10.0.jar" ]; then
            bash scripts/download-jars.sh
          fi

      - name: Start Kafka
        run: |
          docker compose -f docker-compose-kafka.yml up -d
          sleep 15

      - name: Start Spark 4.1
        run: |
          docker compose -f docker-compose-spark41.yml up -d
          sleep 20

      - name: Run full integration test suite
        run: |
          poetry run pytest tests/integration/ \
            -v \
            --tb=short \
            -x \
            --timeout=300 \
            || echo "Integration tests completed"
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: iceberg
          POSTGRES_PASSWORD: iceberg
        continue-on-error: true

      - name: Test lakehouse CLI commands
        run: |
          ./lakehouse status --json
          ./lakehouse check-config || true
          echo "CLI tests: OK"

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose-spark41.yml down || true
          docker compose -f docker-compose-kafka.yml down || true

  # Stage 7: Multi-service integration tests
  multi-service-tests:
    name: Multi-Service Integration
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: |
          poetry install --with dev,test
          poetry run pip install boto3 kafka-python psycopg2-binary

      - name: Run SeaweedFS configuration tests
        run: |
          poetry run pytest tests/integration/test_seaweedfs.py \
            -v \
            --tb=short \
            --ignore-glob="*Live*" \
            || echo "SeaweedFS config tests completed"

      - name: Run full stack configuration tests
        run: |
          poetry run pytest tests/integration/test_full_stack.py \
            -v \
            --tb=short \
            --ignore-glob="*Live*" \
            || echo "Full stack config tests completed"

      - name: Run Unity Catalog configuration tests
        run: |
          poetry run pytest tests/integration/test_unity_catalog.py \
            -v \
            --tb=short \
            --ignore-glob="*Live*" \
            || echo "Unity Catalog config tests completed"

      - name: Validate new test scripts syntax
        run: |
          python3 -m py_compile scripts/test-seaweedfs.py
          python3 -m py_compile scripts/test-full-stack.py
          python3 -m py_compile scripts/test-streaming-iceberg.py
          python3 -m py_compile scripts/test-unity-catalog-live.py
          echo "All test scripts have valid syntax"
