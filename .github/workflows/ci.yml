name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # Stage 1: Basic validation
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --no-root

      - name: Lint with Ruff
        run: poetry run ruff check scripts/ --ignore E501,I001,F401 || echo "Lint warnings (non-blocking)"
        continue-on-error: true

      - name: Check Python formatting with Black
        run: poetry run black --check scripts/ || echo "Format warnings (non-blocking)"
        continue-on-error: true

      - name: Validate shell scripts
        run: |
          bash -n lakehouse
          echo "Shell syntax OK"

      - name: Validate docker-compose files
        run: |
          # Create minimal .env for validation
          touch .env
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose-spark41.yml config --quiet
          docker compose -f docker-compose-kafka.yml config --quiet
          echo "Docker Compose configs valid"

  # Stage 2: Tests with coverage
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run tests with coverage
        run: |
          poetry run pytest tests/ --cov --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Stage 3: Container startup (validates images pull and basic startup)
  containers:
    name: Container Startup
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Create required directories
        run: |
          mkdir -p config/spark jars ivy-cache notebooks
          sudo mkdir -p /data/spark
          sudo chmod 777 /data/spark

      - name: Create minimal spark-defaults.conf
        run: |
          cat > config/spark/spark-defaults.conf << 'EOF'
          spark.master                     spark://localhost:7077
          spark.executor.memory            1g
          spark.driver.memory              1g
          EOF

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          POSTGRES_USER=test
          POSTGRES_PASSWORD=test
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432
          EOF

      - name: Pull and verify Spark 4.0 image
        run: |
          docker pull apache/spark:4.0.1-scala2.13-java17-python3-r-ubuntu
          docker run --rm apache/spark:4.0.1-scala2.13-java17-python3-r-ubuntu \
            /opt/spark/bin/spark-submit --version 2>&1 | grep -E "version [0-9]"
          echo "Spark 4.0 image: OK"

      - name: Pull and verify Spark 4.1 image
        run: |
          docker pull apache/spark:4.1.0-scala2.13-java21-python3-r-ubuntu
          docker run --rm apache/spark:4.1.0-scala2.13-java21-python3-r-ubuntu \
            /opt/spark/bin/spark-submit --version 2>&1 | grep -E "version [0-9]"
          echo "Spark 4.1 image: OK"

      - name: Start and verify Kafka containers
        run: |
          docker compose -f docker-compose-kafka.yml up -d
          sleep 15
          docker ps
          # Confluent Kafka uses /usr/bin/
          docker exec kafka kafka-topics --list --bootstrap-server localhost:9092 || true
          echo "Kafka containers: OK"

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose-kafka.yml down || true

  # Stage 3: Integration tests (Spark job submission)
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: containers
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: iceberg
          POSTGRES_PASSWORD: iceberg
          POSTGRES_DB: iceberg_catalog
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Test PostgreSQL connectivity
        run: |
          PGPASSWORD=iceberg psql -h localhost -U iceberg -d iceberg_catalog -c "SELECT 1;"
          echo "PostgreSQL: OK"

      - name: Run Spark Pi example (local mode)
        run: |
          docker run --rm \
            apache/spark:4.1.0-scala2.13-java21-python3-r-ubuntu \
            /opt/spark/bin/spark-submit \
            --master "local[2]" \
            --class org.apache.spark.examples.SparkPi \
            /opt/spark/examples/jars/spark-examples_2.13-4.1.0.jar 10
          echo "Spark job submission: OK"
        timeout-minutes: 5

      - name: Start Kafka and create test topic
        run: |
          docker compose -f docker-compose-kafka.yml up -d
          sleep 15
          # Confluent Kafka uses kafka-topics (no .sh)
          docker exec kafka kafka-topics \
            --create --topic test-events \
            --bootstrap-server localhost:9092 \
            --partitions 1 --replication-factor 1 || true
          docker exec kafka kafka-topics --list --bootstrap-server localhost:9092
          echo "Kafka topic creation: OK"

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose-kafka.yml down || true
