# Jupyter Lab for running workshop notebooks
#
# Usage:
#   docker compose -f docker-compose-notebooks.yml up -d
#   # Open http://localhost:8889 (no token required)
#   docker compose -f docker-compose-notebooks.yml down
#
# Notes:
# - This notebook container is a Spark 4.1 *client* intended to connect to the
#   standalone Spark 4.1 master (`spark-master-41`) and Kafka (`kafka`) on the
#   same docker compose network.
# - Start everything together so service DNS names resolve:
#   docker compose -f docker-compose-spark41.yml -f docker-compose-kafka.yml -f docker-compose-notebooks.yml up -d --build
# - In notebooks, use:
#     master:  spark://spark-master-41:7078
#     kafka:   kafka:29092

services:
  jupyter:
    build:
      context: .
      dockerfile: docker/notebooks/spark41-jupyter/Dockerfile
    container_name: jupyter
    ports:
      - "8889:8888"
    user: root
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./scripts:/scripts
      - ./data:/data
      - ./jars:/opt/spark/jars-extra
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - SPARK_MASTER=spark://spark-master-41:7078
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    working_dir: /home/jovyan/notebooks
