# =============================================================================
# LanceDB Alerting Rules for Prometheus
# =============================================================================
# These rules define alerts for Lance operations monitoring.
# Import into Prometheus or compatible alerting system.
#
# Usage with Prometheus:
#   rule_files:
#     - /etc/prometheus/rules/lance-alerting-rules.yml
# =============================================================================

groups:
  - name: lance_performance
    interval: 30s
    rules:
      # -------------------------------------------------------------------------
      # Query Performance Alerts
      # -------------------------------------------------------------------------
      - alert: LanceHighQueryLatency
        expr: lance_query_latency_p99 > 1000
        for: 5m
        labels:
          severity: warning
          component: lance
        annotations:
          summary: "High Lance query latency detected"
          description: "P99 query latency is {{ $value }}ms (threshold: 1000ms) on {{ $labels.table }}"
          runbook: "Check index health, consider reindexing or scaling resources"

      - alert: LanceCriticalQueryLatency
        expr: lance_query_latency_p99 > 5000
        for: 2m
        labels:
          severity: critical
          component: lance
        annotations:
          summary: "Critical Lance query latency"
          description: "P99 query latency is {{ $value }}ms (threshold: 5000ms) on {{ $labels.table }}"
          runbook: "Immediate investigation required - check system resources and query patterns"

      - alert: LanceLowQueryThroughput
        expr: rate(lance_queries_total[5m]) < 0.1 and rate(lance_queries_total[5m]) > 0
        for: 10m
        labels:
          severity: warning
          component: lance
        annotations:
          summary: "Low Lance query throughput"
          description: "Query rate dropped to {{ $value }} qps on {{ $labels.table }}"

      # -------------------------------------------------------------------------
      # Write Performance Alerts
      # -------------------------------------------------------------------------
      - alert: LanceWriteErrors
        expr: rate(lance_write_errors_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          component: lance
        annotations:
          summary: "Lance write errors detected"
          description: "Write error rate is {{ $value }} errors/sec on {{ $labels.table }}"
          runbook: "Check storage availability, concurrent write conflicts, and disk space"

      - alert: LanceWriteLatencyHigh
        expr: lance_write_latency_p99 > 5000
        for: 5m
        labels:
          severity: warning
          component: lance
        annotations:
          summary: "High Lance write latency"
          description: "P99 write latency is {{ $value }}ms on {{ $labels.table }}"
          runbook: "Check storage I/O, consider batching writes or compaction"

      - alert: LanceWriteBacklog
        expr: lance_write_queue_size > 1000
        for: 5m
        labels:
          severity: warning
          component: lance
        annotations:
          summary: "Lance write backlog growing"
          description: "Write queue size is {{ $value }} on {{ $labels.table }}"

  - name: lance_storage
    interval: 60s
    rules:
      # -------------------------------------------------------------------------
      # Storage Alerts
      # -------------------------------------------------------------------------
      - alert: LanceHighDiskUsage
        expr: lance_disk_usage_bytes / lance_disk_total_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
          component: lance
        annotations:
          summary: "High disk usage for Lance storage"
          description: "Disk usage is {{ $value }}% on {{ $labels.path }}"
          runbook: "Consider compaction, archiving old data, or expanding storage"

      - alert: LanceCriticalDiskUsage
        expr: lance_disk_usage_bytes / lance_disk_total_bytes * 100 > 95
        for: 2m
        labels:
          severity: critical
          component: lance
        annotations:
          summary: "Critical disk usage for Lance storage"
          description: "Disk usage is {{ $value }}% on {{ $labels.path }}"
          runbook: "Immediate action required - risk of write failures"

      - alert: LanceFragmentationHigh
        expr: lance_fragment_count > 100
        for: 15m
        labels:
          severity: warning
          component: lance
        annotations:
          summary: "High fragmentation in Lance table"
          description: "Fragment count is {{ $value }} on {{ $labels.table }}"
          runbook: "Run compaction to optimize storage and query performance"

      - alert: LanceTableSizeGrowthRapid
        expr: rate(lance_table_size_bytes[1h]) > 100000000
        for: 30m
        labels:
          severity: info
          component: lance
        annotations:
          summary: "Rapid Lance table growth"
          description: "Table {{ $labels.table }} growing at {{ $value }} bytes/hour"

  - name: lance_index
    interval: 60s
    rules:
      # -------------------------------------------------------------------------
      # Index Alerts
      # -------------------------------------------------------------------------
      - alert: LanceIndexMissing
        expr: lance_index_exists == 0 and lance_row_count > 256
        for: 10m
        labels:
          severity: warning
          component: lance
        annotations:
          summary: "Lance table missing vector index"
          description: "Table {{ $labels.table }} has {{ $value }} rows but no vector index"
          runbook: "Create index with create_index() for better query performance"

      - alert: LanceIndexStale
        expr: time() - lance_index_created_timestamp > 86400 * 7
        for: 1h
        labels:
          severity: info
          component: lance
        annotations:
          summary: "Lance index may be stale"
          description: "Index on {{ $labels.table }} was created {{ $value }} seconds ago"
          runbook: "Consider rebuilding index if data distribution has changed significantly"

      - alert: LanceIndexBuildFailed
        expr: increase(lance_index_build_failures_total[1h]) > 0
        for: 5m
        labels:
          severity: warning
          component: lance
        annotations:
          summary: "Lance index build failed"
          description: "Index build failed on {{ $labels.table }}"
          runbook: "Check logs for index build errors, ensure sufficient memory"

  - name: lance_health
    interval: 30s
    rules:
      # -------------------------------------------------------------------------
      # Health Alerts
      # -------------------------------------------------------------------------
      - alert: LanceServiceDown
        expr: up{job="lance"} == 0
        for: 1m
        labels:
          severity: critical
          component: lance
        annotations:
          summary: "Lance service is down"
          description: "Lance monitoring endpoint is not responding"
          runbook: "Check service status and container health"

      - alert: LanceHighMemoryUsage
        expr: process_resident_memory_bytes{job="lance"} / 1024 / 1024 / 1024 > 8
        for: 5m
        labels:
          severity: warning
          component: lance
        annotations:
          summary: "High memory usage in Lance process"
          description: "Memory usage is {{ $value }}GB"
          runbook: "Check for memory leaks, consider increasing resources or batch sizes"

      - alert: LanceConnectionPoolExhausted
        expr: lance_active_connections >= lance_max_connections * 0.9
        for: 5m
        labels:
          severity: warning
          component: lance
        annotations:
          summary: "Lance connection pool nearly exhausted"
          description: "{{ $value }} of {{ $labels.max }} connections in use"

  - name: lance_kafka_integration
    interval: 30s
    rules:
      # -------------------------------------------------------------------------
      # Kafka Integration Alerts
      # -------------------------------------------------------------------------
      - alert: LanceKafkaLag
        expr: lance_kafka_consumer_lag > 10000
        for: 5m
        labels:
          severity: warning
          component: lance
        annotations:
          summary: "Lance Kafka consumer lag high"
          description: "Consumer lag is {{ $value }} messages on {{ $labels.topic }}"
          runbook: "Scale consumers or increase batch size"

      - alert: LanceKafkaConsumerStopped
        expr: rate(lance_kafka_messages_consumed_total[5m]) == 0 and lance_kafka_consumer_lag > 0
        for: 5m
        labels:
          severity: critical
          component: lance
        annotations:
          summary: "Lance Kafka consumer stopped"
          description: "No messages consumed but lag exists on {{ $labels.topic }}"
          runbook: "Check consumer health and Kafka connectivity"

      - alert: LanceEmbeddingErrors
        expr: rate(lance_embedding_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          component: lance
        annotations:
          summary: "Embedding generation errors"
          description: "Embedding error rate is {{ $value }}/sec"
          runbook: "Check embedding model availability and input data quality"
